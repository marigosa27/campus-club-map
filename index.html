<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="description" content="Interactive campus map for finding club meeting locations.">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        #map {
            width: 100%;
            height: 100vh;
        }
        .geolocate-user {
            top: 4.5em;
            left: .5em;
        }
        .geolocate-user button {
            font-size: 1.2em;
            font-weight: bold;
            line-height: 1.4em;
            width: 1.8em;
            height: 1.8em;
        }
        .geolocate-user button.is-active {
            background-color: #2563eb!important;
            color: #ffffff!important;
        }
        .manual-location-panel {
            position: absolute;
            top: 5.25em;
            left: 3.5em;
            z-index: 1000;
            width: min(280px, calc(100% - 5em));
            box-sizing: border-box;
            background: #ffffff;
            border: 1px solid rgba(0,0,0,.2);
            box-shadow: 0 8px 24px rgba(0,0,0,.18);
            padding: 12px;
            font: 13px/1.35 Arial, sans-serif;
            color: #222222;
        }
        .manual-location-panel p {
            margin: 6px 0 10px;
        }
        .manual-location-panel label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .manual-location-panel input {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-top: 3px;
            padding: 6px;
            border: 1px solid #b8b8b8;
        }
        .manual-location-actions {
            display: flex;
            gap: 8px;
        }
        .manual-location-actions button {
            padding: 6px 10px;
            border: 1px solid #999999;
            background: #f8f8f8;
            cursor: pointer;
        }
        .club-meetings-toggle {
            position: absolute;
            top: 12px;
            right: 48px;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 11px;
            border: 1px solid rgba(0,0,0,.22);
            border-radius: 6px;
            background: #ffffff;
            color: #1f2937;
            box-shadow: 0 4px 14px rgba(0,0,0,.16);
            font: 700 13px/1.2 Arial, sans-serif;
            cursor: pointer;
        }
        .club-meetings-toggle::before {
            content: "";
            width: 12px;
            height: 12px;
            background: #dc2626;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 35%);
        }
        .club-meetings-toggle.is-off {
            opacity: .62;
        }
        .club-meetings-toggle.is-off::before {
            background: #6b7280;
        }
        @media (max-width: 520px) {
            .club-meetings-toggle {
                top: auto;
                right: 12px;
                bottom: 58px;
            }
        }
        </style>
        <title>Campus Club Meeting Map</title>
    </head>
    <body>
        <div id="map">
            <button id="club-meetings-toggle" class="club-meetings-toggle" type="button" aria-pressed="true">Club Meetings</button>
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/mobility_1.js?v=20260715-geometry"></script><script src="layers/buildings_2.js?v=20260715-geometry"></script><script src="layers/dormbuildings_3.js"></script><script src="layers/entrances_exit_4.js"></script><script src="layers/facilities_5.js?v=20260715-geometry"></script><script src="layers/facultyhouses_6.js"></script><script src="layers/clublocationweek1_7.js"></script><script src="layers/campusarea_8.js"></script><script src="layers/clubmeetings_9.js?v=20260707-time"></script>
        <script src="styles/mobility_1_style.js"></script><script src="styles/buildings_2_style.js"></script><script src="styles/dormbuildings_3_style.js"></script><script src="styles/entrances_exit_4_style.js"></script><script src="styles/facilities_5_style.js"></script><script src="styles/facultyhouses_6_style.js"></script><script src="styles/clublocationweek1_7_style.js"></script><script src="styles/campusarea_8_style.js"></script><script src="styles/clubmeetings_9_style.js?v=20260720-club-toggle"></script>
        <script src="./layers/layers.js?v=20260707-time" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js?v=20260720-club-toggle"></script>
        <script src="./resources/geolocate-user.js?v=20260707-time"></script>
    </body>
</html>
